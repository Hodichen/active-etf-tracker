name: Daily Active ETF Tracker

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch: 

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行 ETF 追蹤程式
      run: python main.py

    - name: 將最新持股資料 Commit 回 GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add *_latest.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "自動更新：ETF 最新持股資料"
        git push
